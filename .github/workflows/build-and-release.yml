name: Build and Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '6.0.x'
  CONFIGURATION: Release
  ARTIFACT_NAME: Jellyfin.Xtream.V3

jobs:
  build:
    name: Build Project
    runs-on: windows-latest
    # Only run on commits, not on tag pushes
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Run benchmarks
      run: dotnet build --configuration ${{ env.CONFIGURATION }} -p:BenchmarksEnabled=true
      continue-on-error: true

    - name: Publish artifacts
      run: dotnet publish -c ${{ env.CONFIGURATION }} -o ./publish

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ./publish
        retention-days: 30

  test:
    name: Test Project
    runs-on: windows-latest
    needs: build
    # Only run on commits, not on tag pushes
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Run tests
      run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-restore --verbosity normal
      continue-on-error: true
