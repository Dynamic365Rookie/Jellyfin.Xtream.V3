name: Publish Repository Manifest

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-manifest:
    name: Generate Repository Manifest
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Get latest release information
      id: version
      run: |
        # Get the latest release from GitHub API
        LATEST_RELEASE=$(curl -s https://api.github.com/repos/Dynamic365Rookie/Jellyfin.Xtream.V3/releases/latest)

        # Extract version (tag_name without 'v' prefix)
        VERSION=$(echo "$LATEST_RELEASE" | jq -r '.tag_name' | sed 's/^v//')

        # Get ZIP download URL
        ZIP_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)

        # Fallback if no release found
        if [ -z "$VERSION" ] || [ "$VERSION" == "null" ]; then
          VERSION="3.0.0-$(date +%Y%m%d.%H%M%S)"
          ZIP_URL="https://github.com/Dynamic365Rookie/Jellyfin.Xtream.V3/releases/download/v${VERSION}/Jellyfin.Xtream.V3-v${VERSION}.zip"
        fi

        COMMIT=$(git rev-parse --short HEAD)

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "commit=$COMMIT" >> $GITHUB_OUTPUT
        echo "zip_url=$ZIP_URL" >> $GITHUB_OUTPUT

        echo "Version: $VERSION"
        echo "Commit: $COMMIT"
        echo "ZIP URL: $ZIP_URL"

    - name: Setup PowerShell
      run: |
        pwsh --version

    - name: Download release ZIP for checksum calculation
      run: |
        ZIP_URL="${{ steps.version.outputs.zip_url }}"
        if [ -n "$ZIP_URL" ] && [ "$ZIP_URL" != "null" ]; then
          echo "Downloading ZIP from: $ZIP_URL"
          curl -L -o plugin.zip "$ZIP_URL" || echo "Failed to download ZIP, will generate manifest without checksum"
        else
          echo "No ZIP URL available, will generate manifest without checksum"
        fi

    - name: Generate repository.json
      run: |
        # Check if plugin.zip was downloaded
        if [ -f plugin.zip ]; then
          ZIP_PATH="plugin.zip"
        else
          ZIP_PATH=""
        fi

        pwsh -Command "
          \$params = @{
            OutputPath = 'repository.json'
            PluginZipPath = '$ZIP_PATH'
            Version = '${{ steps.version.outputs.version }}'
            CommitHash = '${{ steps.version.outputs.commit }}'
            ReleaseUrl = '${{ steps.version.outputs.zip_url }}'
          }
          & './.github/scripts/generate-repository.ps1' @params
        "

    - name: Verify repository.json
      run: |
        if [ -f repository.json ]; then
          echo "? repository.json created successfully"
          cat repository.json | jq .
        else
          echo "? repository.json not found"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: repository-manifest
        path: repository.json

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v5

    - name: Create GitHub Pages content
      run: |
        mkdir -p _site
        cp repository.json _site/repository.json
        echo "Repository manifest uploaded to GitHub Pages"

    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

  deploy:
    name: Deploy to GitHub Pages
    needs: generate-manifest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Verify deployment
      run: |
        echo "Repository manifest deployed to GitHub Pages"
        echo "URL: https://dynamic365rookie.github.io/Jellyfin.Xtream.V3/repository.json"
