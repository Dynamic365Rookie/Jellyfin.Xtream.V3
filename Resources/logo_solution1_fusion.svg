<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Solution 1: Fusion Élégante -->
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cercle de fond -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.15" stroke="url(#grad1)" stroke-width="2"/>

  <!-- Symbole de flux (ondes) -->
  <g>
    <!-- Onde 1 -->
    <path d="M 60 100 Q 65 90 70 100 Q 75 110 80 100" stroke="#00D4FF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Onde 2 -->
    <path d="M 80 100 Q 85 90 90 100 Q 95 110 100 100" stroke="#00D4FF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Onde 3 -->
    <path d="M 100 100 Q 105 90 110 100 Q 115 110 120 100" stroke="#FF6B35" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Play button (triangle) -->
  <polygon points="130,80 130,120 160,100" fill="#FF6B35"/>

  <!-- Ombre douce -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
</svg>