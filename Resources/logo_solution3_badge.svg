<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Solution 3: Badge/Emblème -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagone de fond -->
  <polygon points="100,20 160,50 160,150 100,180 40,150 40,50"
           fill="url(#grad3)" stroke="#00D4FF" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Ondes Xtream en fond (hexagone) -->
  <g opacity="0.3">
    <path d="M 70 80 Q 75 70 85 80 Q 90 85 80 95" stroke="#00D4FF" stroke-width="2" fill="none"/>
    <path d="M 90 75 Q 95 65 105 75 Q 110 80 100 90" stroke="#00D4FF" stroke-width="2" fill="none"/>
    <path d="M 110 80 Q 115 70 125 80 Q 130 85 120 95" stroke="#00D4FF" stroke-width="2" fill="none"/>
  </g>

  <!-- Play button central (Jellyfin) -->
  <circle cx="100" cy="105" r="30" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.8"/>
  <polygon points="90,95 90,115 115,105" fill="#FF6B35" filter="url(#glow)"/>

  <!-- Éclats Xtream autour -->
  <g fill="#00D4FF" opacity="0.7" filter="url(#glow)">
    <circle cx="65" cy="65" r="3"/>
    <circle cx="135" cy="65" r="3"/>
    <circle cx="150" cy="105" r="3"/>
    <circle cx="50" cy="105" r="3"/>
    <circle cx="135" cy="140" r="3"/>
    <circle cx="65" cy="140" r="3"/>
  </g>
</svg>